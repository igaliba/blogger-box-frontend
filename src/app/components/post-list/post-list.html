<div class="container mt-5">
  <div class="row justify-content-center mb-5">
    <div class="col-md-8">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3">
          <h4 class="mb-0 text-center font-weight-bold">✨ Créer un nouvel article</h4>
        </div>
        <div class="card-body p-4">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Titre</label>
              <input type="text" class="form-control" [(ngModel)]="newTitle" placeholder="Titre de l'article">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Auteur</label>
              <input type="text" class="form-control" [(ngModel)]="newAuthor" placeholder="Votre nom">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Contenu</label>
            <textarea class="form-control" rows="4" [(ngModel)]="newContent" placeholder="Qu'avez-vous en tête ?"></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Catégorie</label>
            <select class="form-select" [(ngModel)]="newCategoryId">
              <option value="" disabled selected>Choisir une catégorie...</option>
              <option *ngFor="let cat of categories" [value]="cat.id">
                {{ cat.name }}
              </option>
            </select>
          </div>
          <div class="d-grid">
            <button class="btn btn-primary btn-lg" (click)="onSubmit()">🚀 Publier l'article</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <hr class="my-5">

  <h2 class="text-center mb-4">Derniers Articles</h2>
  <div class="row">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let post of posts">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title fw-bold">{{ post.title }}</h5>
          <p class="text-muted small">✍️ Par : {{ post.author || 'Anonyme' }}</p>
          <p class="card-text text-secondary">{{ post.content }}</p>
          <div class="mt-3 pt-3 border-top d-flex justify-content-between align-items-center">
            <span class="badge rounded-pill bg-info text-dark">📁 {{ post.category.name }}</span>
            <small class="text-muted">📅 {{ post.createdDate | date:'mediumDate' }}</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
